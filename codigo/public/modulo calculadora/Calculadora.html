<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juros Compostos</title>
  <style>
    body {font-family: Arial, sans-serif; background: #f0f2f5; margin: 0;}
    .container {max-width: 800px; margin: 20px auto; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden;}
    header {background: #007bff; color: white; padding: 20px; text-align: center;}
    main {padding: 20px;}
    .inputs label {display: block; margin: 15px 0;}
    .inputs input, .inputs select {width: 100%; padding: 8px; font-size: 16px;}
    button {padding: 10px 15px; margin: 5px; cursor: pointer;}
    .results {margin-top: 30px;}
    .final-balance {font-size: 24px; font-weight: bold; text-align: center; background: #e7f3ff; padding: 15px; border-radius: 8px;}
    table {width: 100%; border-collapse: collapse; margin-top: 10px;}
    th, td {border: 1px solid #ddd; padding: 8px; text-align: right;}
    th {background: #f8f9fa;}
    footer {padding: 20px; text-align: center; background: #f8f9fa;}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Juros Compostos</h1>
    </header>
    <main>
      <section class="inputs">
        <h2>Entradas</h2>
        <label>
          Principal (R$)
          <input type="number" id="principal" value="1000" min="0">
        </label>
        <label>
          Taxa anual (%)
          <input type="number" id="rate" value="5" step="0.01" min="0">
        </label>
        <label>
          Períodos (anos)
          <input type="number" id="years" value="5" min="1">
        </label>
        <label>
          Capitalização (frequência)
          <select id="freq">
            <option value="12">Mensal</option>
            <option value="1">Anual</option>
            <option value="2">Semestral</option>
            <option value="4">Trimestral</option>
            <option value="365">Diária</option>
          </select>
        </label>
        <button id="reset">Reset</button>
      </section>
      <section class="results">
        <h2>Resumo</h2>
        <div class="final-balance">
          <span>Saldo final</span>
          <span id="finalAmount">R$ 1.283,36</span>
        </div>
        <div class="details">
          <h3>Detalhes da Simulação</h3>
          <ul>
            <li>Principal: R$ <span id="detailPrincipal">1.000,00</span></li>
            <li>Taxa anual: <span id="detailRate">5%</span></li>
            <li>Períodos: <span id="detailYears">5 anos</span></li>
            <li>Capitalizações por ano: <span id="detailFreq">12</span></li>
            <li>Juros ganhos: R$ <span id="detailInterest">283,36</span></li>
          </ul>
        </div>
        <div class="table">
          <h3>Tabela (Ano - Saldo)</h3>
          <table>
            <thead>
              <tr>
                <th>Ano</th>
                <th>Saldo (R$)</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <footer>
      <button id="exportCSV">Exportar CSV</button>
      <button id="saveSimulation">Salvar Simulação</button>
      <button id="showGraph">Gráfico</button>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
