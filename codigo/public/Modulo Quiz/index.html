<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Gamificado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/Quiz.Css">
</head>
<body>

    <div id="overlay-erro" class="overlay"></div>
    <div id="overlay-streak" class="overlay"></div>

    <div class="container-externo">
        
        <div id="quiz-view">
            <span id="numero-questao-texto" class="numero-questao"></span>
            
            <div class="quiz-container">
                <div class="progresso-container">
                    <div id="barra-progresso" class="barra-progresso"></div>
                </div>

                <div class="quiz-header">
                    <div id="contador-tempo" class="contador-tempo">15</div>
                </div>

                <h2 id="pergunta-texto" class="pergunta"></h2>
                
                <div id="imagem-container" class="imagem-container hidden">
                    <img id="imagem-pergunta" src="" alt="Imagem da Questão">
                </div>

                <div id="opcoes-container" class="opcoes-container">
                </div>
            </div>
        </div>

        <div id="resultado-view" class="resultado hidden">
            <h3>Quiz Finalizado!</h3>
            <p id="resultado-texto"></p>
            <p id="texto-topicos">Topicos e de outro integrante</p>
            <button id="reiniciar-btn" class="reiniciar-btn">Reiniciar Quiz</button>
        </div>
        
        <div id="admin-tools-view" class="resultado hidden">
            <h3 style="color: #007bff;">Painel de Controle (ADMIN)</h3>
            <p>Você tem acesso para gerenciar as questões.</p>
            
            <button id="crud-link-btn" class="reiniciar-btn" style="background-color: #007bff; margin-bottom: 10px;">
                Gerenciar Questões (CRUD)
            </button>
            
            <button id="admin-quiz-btn" class="reiniciar-btn">
                Jogar o Quiz
            </button>
        </div>
        </div>

    <audio id="audio-vitoria" src="/assets/Audios/Vitoria.mp3" preload="auto"></audio>
    <audio id="audio-derrota" src="/assets/Audios/Derrota.m4a" preload="auto"></audio>
    <audio id="audio-acerto-maximo" src="/assets/Audios/VitoriaMaxima.mp3" preload="auto"></audio>
    <audio id="audio-derrota-maxima" src="/assets/Audios/DerrotaMaxima.mp3" preload="auto"></audio>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
    
    <script src="/assets/js/Quiz.js"></script>
</body>
</html>
