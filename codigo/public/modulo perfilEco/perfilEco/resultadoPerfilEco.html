<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Perfil Econômico</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Google Font (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Arquivo CSS Personalizado (caminho corrigido) -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

    <div class="resultadoPerfilEco">
        <h1 class="page-title">Resultado: Perfil Econômico</h1>

        <!-- Card Principal -->
        <div class="profile-card">
            <div class="card-body p-0">
                <div class="row g-0">
                    
                    <!-- Legenda (Primeiro no mobile) -->
                    <div class="col-lg-6 order-lg-1">
                        <div class="legend-container" id="legend">
                            <h4 class="legend-title">Resumo Visual:</h4>
                            
                            <!-- Itens da legenda serão populados pelo JS -->
                            <div id="legend-items-container">
                                <p class="text-muted">Carregando dados...</p>
                            </div>

                        </div>
                    </div>

                    <!-- Gráfico -->
                    <div class="col-lg-6 order-lg-2">
                        <div class="chart-container">
                            <div class="pie-chart" id="pieChart">
                                <span>Gráfico</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Seção de Atualização -->
        <div class="update-section">
            <label for="profileIdInput" class="form-label fw-semibold">Atualizar Perfil:</label>
            <div class="input-group">
                <span class="input-group-text">ID:</span>
                <input type="text" class="form-control" id="profileIdInput" placeholder="Digite um ID (ex: 1, 3c54, bfae)" value="1">
                <button class="btn btn-primary" type="button" id="updateButton">Atualizar</button>
            </div>
            
            <!-- Caixa de Mensagem para Erros/Feedback -->
            <div id="message-box" role="alert"></div>
        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- JavaScript  -->
    <script src="/assets/js/resultadoPerfilEco.js"></script>
</body>
</html>
