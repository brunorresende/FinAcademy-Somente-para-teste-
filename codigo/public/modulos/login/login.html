<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAcademy - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/codigo/public/assets/css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="visual-side">
            <div class="content-overlay">
                <div class="text-area">
                    <h2>Domine seu dinheiro.</h2>
                    <p>A jornada para a liberdade financeira começa com o primeiro passo. Acesse sua conta e continue evoluindo.</p>
                </div>
            </div>
            <div class="circle c1"></div>
            <div class="circle c2"></div>
        </div>

        <div class="form-side">
            <div class="form-container fade-in-up">
                
                <a href="/" class="logo-link-header">
                    <div class="logo-area-form">
                        <img src="/assets/images/conteudo-img/Logo.jpeg" alt="FinAcademy Logo" class="brand-logo-form">
                    </div>
                </a>

                <div class="header-form">
                    <h3>Bem-vindo de volta!</h3>
                    <p class="subtitle">Insira seus dados para entrar.</p>
                </div>

                <form id="login-form">
                    <div class="input-group-custom">
                        <label for="username"><i class="fas fa-user"></i> Usuário</label>
                        <input type="text" id="username" placeholder="Digite seu login" required>
                    </div>

                    <div class="input-group-custom">
                        <label for="password"><i class="fas fa-lock"></i> Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fas fa-eye toggle-pass" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-login">
                            Entrar na Plataforma <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    <div class="footer-form">
                        <p>Ainda não tem conta? <a href="#" data-bs-toggle="modal" data-bs-target="#registroModal">Crie uma agora</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registroModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Criar Nova Conta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="registro-form">
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="reg_nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Usuário (Login)</label>
                            <input type="text" class="form-control" id="reg_login" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="reg_email" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Senha</label>
                                <input type="password" class="form-control" id="reg_senha" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Confirmar</label>
                                <input type="password" class="form-control" id="reg_senha2" required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="button" id="btn_salvar_registro" class="btn-register-modal">Cadastrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/login.js"></script>
</body>
</html>
